<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAINE</title>
  <meta name="theme-color" content="#ff1a1a">
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #0b0b0b; --red: #ff1a1a; --grid: rgba(255,255,255,0.032); }
    html, body {
      height: 100%; background: var(--bg);
      color: #c8c8c8; font-family: -apple-system, 'Inter', sans-serif;
      font-weight: 300; overflow: hidden;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 56px 56px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.6) 100%);
      pointer-events: none;
    }
    #wrap {
      position: relative; z-index: 1; height: 100dvh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0;
    }
    #orb {
      width: 56px; height: 56px; border-radius: 50%;
      background: radial-gradient(circle at 36% 32%, #ff6060 0%, #ff1a1a 45%, #990000 100%);
      box-shadow: 0 0 22px 6px rgba(255,15,15,0.4), 0 0 60px 20px rgba(255,5,5,0.18);
      animation: breathe 4.5s ease-in-out infinite;
      opacity: 0.4;
      filter: grayscale(0.5);
    }
    @keyframes breathe {
      0%,100% { box-shadow: 0 0 22px 6px rgba(255,15,15,0.4), 0 0 60px 20px rgba(255,5,5,0.18); }
      50%      { box-shadow: 0 0 30px 8px rgba(255,15,15,0.5), 0 0 80px 28px rgba(255,5,5,0.24); }
    }
    #label {
      margin-top: 20px; font-size: 10px; font-weight: 500;
      letter-spacing: 0.44em; color: #333; text-transform: uppercase;
    }
    #status {
      margin-top: 28px; font-size: 11px; color: #3a3a3a;
      letter-spacing: 0.12em; text-align: center; line-height: 1.8;
    }
    #status span { display: block; color: #552222; font-size: 10px; margin-top: 6px; }
    #retry {
      margin-top: 32px; padding: 10px 28px;
      background: transparent; border: 1px solid #2a2a2a;
      color: #444; font-size: 10px; letter-spacing: 0.2em;
      text-transform: uppercase; cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    #retry:hover { border-color: #ff1a1a44; color: #888; }
  </style>
</head>
<body>
<div id="wrap">
  <div id="orb"></div>
  <div id="label">C A I N E</div>
  <div id="status">
    he is unreachable right now
    <span>no connection</span>
  </div>
  <button id="retry" onclick="location.reload()">try again</button>
</div>
</body>
</html>
