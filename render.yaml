services:
  - type: web
    name: caine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python3 server.py
    plan: free
    envVars:
      - key: GROQ_KEY
        sync: false   # you set this in Render dashboard
      - key: GEMINI_KEY
        sync: false
      - key: CAINE_BACKEND
        value: cloud
